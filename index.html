<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D 💖 Vinos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe5ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #ffccd5;
        }

        /* ستایلی نوێ بۆ ناوەکان و پیتەکە */
        .name-title {
            color: #ff4d6d;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .heart-divider {
            color: #ffb3c1;
            font-size: 18px;
            margin-bottom: 25px;
        }

        h2 {
            color: #4a4a4a;
            font-size: 22px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        .btn-yes {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }

        .btn-no {
            background-color: #7a7a7a;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: scale(1.15);
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card" id="loveCard">
        <div class="name-title">D 💖 Vinos</div>
        <div class="heart-divider">✦ ✨ ✦</div>
        
        <h2 id="question">منت خۆش دەوێ؟ 🥺❤️</h2>
        
        <div class="btn-group" id="buttons">
            <button class="btn btn-yes" onclick="answer('yes')">بەڵێ</button>
            <button class="btn btn-no" onclick="answer('no')">نەخێر</button>
        </div>
    </div>

    <script>
        function answer(reply) {
            const card = document.getElementById('loveCard');
            
            if (reply === 'yes') {
                card.innerHTML = `
                    <div class="fade-in">
                        <div class="name-title" style="font-size: 35px;">یااای! 🥰</div>
                        <div class="heart-divider">D 💖 Vinos</div>
                        <h2 style="color: #ff4d6d; font-size: 26px; font-weight: bold;">منیش زۆرم خۆش دەوێییی! 🫶🏻😭</h2>
                        <div style="font-size: 60px; margin-top: 20px;">✨🌹✨</div>
                    </div>
                `;
            } else if (reply === 'no') {
                card.innerHTML = `
                    <div class="fade-in">
                        <div class="name-title" style="color: #6c757d; font-size: 32px;">ئۆو... 🥺</div>
                        <div class="heart-divider">D 💔 Vinos</div>
                        <h2 style="color: #6c757d; font-size: 24px;">هەوڵێکی تریش ئەدەم! 🙌🏻❤️‍🩹</h2>
                        <div style="font-size: 60px; margin-top: 20px;">🚶🏻‍♂️✨</div>
                    </div>
                `;
            }
        }
    </script>

</body>
</html>
